name: Playwright Tests
on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at 00:00 UTC
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Check Environment Versions
      run: |
         node -v
         npm -v
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Send Email Notification
      uses: dawidd6/action-send-mail@v4
      with:
        # SMTP Server configuration (Example using Gmail SMTP)
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        
        # job.status will now correctly say "success" or "failure"
        subject: "Playwright Automation Run: ${{ job.status }}"
        to: gomez1993jose@gmail.com
        from: Playwright Automation Runner
        body: |
          The daily automated test run has completed.
          
          Result Status: ${{ job.status }}
          Repository: ${{ github.repository }}
          Workflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        
        # Only attach the file if the job actually failed
        attachments: ${{ job.status == 'failure' && 'playwright-report.tar.gz' || '' }}
